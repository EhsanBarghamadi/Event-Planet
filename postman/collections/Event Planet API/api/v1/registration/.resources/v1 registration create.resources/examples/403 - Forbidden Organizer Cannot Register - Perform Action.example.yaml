$kind: http-example
name: 403 - Forbidden Organizer Cannot Register / Perform Action
request:
  url: "{{baseUrl}}/api/v1/registration/"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "event_id": 7
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Date: Thu, 23 Jul 2026 14:51:31 GMT
    Server: WSGIServer/0.2 CPython/3.12.13
    Content-Type: application/json
    Vary: Accept
    Allow: GET, POST
    X-Frame-Options: DENY
    Content-Length: "63"
    X-Content-Type-Options: nosniff
    Referrer-Policy: same-origin
    Cross-Origin-Opener-Policy: same-origin
  body:
    type: text
    content: |-
      {
          "detail": "You do not have permission to perform this action."
      }
order: 2000
