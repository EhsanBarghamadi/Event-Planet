$kind: http-request
url: "{{baseUrl}}/api/v1/user/login/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "password": "string",
      "phone": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
settings: {}
examples: ./.resources/v1 user login create.resources/examples
order: 1000
