$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/login/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "password": "string",
        "phone": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "password": false,
        "phone": 233.78041153344188
      }
order: 1000
