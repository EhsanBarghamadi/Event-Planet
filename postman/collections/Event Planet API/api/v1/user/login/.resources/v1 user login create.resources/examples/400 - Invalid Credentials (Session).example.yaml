$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/login/"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "phone": "09111111111",
        "password": "ahmad124"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Date: Wed, 22 Jul 2026 15:32:59 GMT
    Server: WSGIServer/0.2 CPython/3.12.13
    Content-Type: application/json
    Vary: Accept, Cookie
    Allow: POST, OPTIONS
    X-Frame-Options: DENY
    Content-Length: "85"
    X-Content-Type-Options: nosniff
    Referrer-Policy: same-origin
    Cross-Origin-Opener-Policy: same-origin
  body:
    type: text
    content: |-
      {
          "non_field_errors": [
              "نام کاربری یا رمز عبور اشتباه است"
          ]
      }
order: 3000
