$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/token/logout/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "refresh": "string"
      }
response:
  statusCode: 205
  statusText: Reset Content
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
order: 1000
