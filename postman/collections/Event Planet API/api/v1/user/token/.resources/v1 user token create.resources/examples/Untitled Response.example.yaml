$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/token/"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "password": "string",
        "phone": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "password": false,
        "phone": 233.78041153344188
      }
order: 1000
