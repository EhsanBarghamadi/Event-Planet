$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/token/refresh/"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "refresh": "string",
        "access": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "access": "string",
        "refresh": true
      }
order: 1000
