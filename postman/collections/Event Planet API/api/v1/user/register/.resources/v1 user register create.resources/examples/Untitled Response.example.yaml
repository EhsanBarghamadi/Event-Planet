$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/user/register/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "first_name": "string",
        "last_name": "string",
        "password": "string",
        "phone": "string",
        "role": "ORGANIZER"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "first_name": "string",
        "last_name": "string",
        "phone": "string",
        "role": "ORGANIZER"
      }
order: 1000
