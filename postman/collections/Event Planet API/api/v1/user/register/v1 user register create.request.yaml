$kind: http-request
url: "{{baseUrl}}/api/v1/user/register/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |+
    {
      "first_name": "string",
      "last_name": "string",
      "password": "string",
      "phone": "string",
      "role": "ORGANIZER"
    }

auth:
  type: noauth
settings: {}
examples: ./.resources/v1 user register create.resources/examples
order: 1000
