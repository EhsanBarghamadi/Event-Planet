$kind: http-request
url: "{{baseUrl}}/api/v1/attribute/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "data_type": "BOOLEAN",
      "name": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
settings: {}
examples: ./.resources/v1 attribute create.resources/examples
order: 3000
