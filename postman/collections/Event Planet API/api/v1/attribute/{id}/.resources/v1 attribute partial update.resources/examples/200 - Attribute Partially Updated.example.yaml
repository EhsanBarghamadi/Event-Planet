$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/attribute/:id/"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "10"
      description: A unique integer value identifying this ویژگی داینامیک.
  body:
    type: json
    content: |-
      {
          "name": "لینک گروه تلگرام"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Date: Thu, 23 Jul 2026 01:39:26 GMT
    Server: WSGIServer/0.2 CPython/3.12.13
    Content-Type: application/json
    Vary: Accept
    Allow: GET, PUT, PATCH, DELETE, HEAD, OPTIONS
    X-Frame-Options: DENY
    Content-Length: "95"
    X-Content-Type-Options: nosniff
    Referrer-Policy: same-origin
    Cross-Origin-Opener-Policy: same-origin
  body:
    type: text
    content: |-
      {
          "id": 10,
          "slug": "لینک-گروه",
          "name": "لینک گروه تلگرام",
          "data_type": "TEXT"
      }
order: 2000
