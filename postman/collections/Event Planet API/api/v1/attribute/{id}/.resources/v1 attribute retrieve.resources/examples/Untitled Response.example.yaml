$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/attribute/:id/"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data_type": "BOOLEAN",
        "id": 8354,
        "name": "string",
        "slug": "p3Gi9m"
      }
order: 1000
