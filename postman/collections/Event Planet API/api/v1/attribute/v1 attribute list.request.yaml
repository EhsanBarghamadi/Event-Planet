$kind: http-request
url: "{{baseUrl}}/api/v1/attribute/?search=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: search
    value: string
    description: A search term.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
settings: {}
examples: ./.resources/v1 attribute list.resources/examples
order: 2000
