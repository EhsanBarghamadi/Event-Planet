      enum:
      - DRAFT
      - PUBLISHED
      - ONGOING
      - CLOSED
      - FINISHED
      - CANCELLED
      type: string
      description: |-
        * `DRAFT` - پیش‌نویس
        * `PUBLISHED` - منتشر شده
        * `ONGOING` - در حال برگزاری
        * `CLOSED` - بسته شده
        * `FINISHED` - پایان یافته
        * `CANCELLED` - لغو شده
