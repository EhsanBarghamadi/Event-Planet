      - in: query
        name: status
        schema:
          type: string
          title: وضعیت
          enum:
          - CANCELLED
          - CLOSED
          - DRAFT
          - FINISHED
          - ONGOING
          - PUBLISHED
        description: |-
          * `DRAFT` - پیش‌نویس
          * `PUBLISHED` - منتشر شده
          * `ONGOING` - در حال برگزاری
          * `CLOSED` - بسته شده
          * `FINISHED` - پایان یافته
          * `CANCELLED` - لغو شده
