components:
  schemas:
    Attribute:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          title: اسلاگ
          pattern: ^[-\w]+$
          maxLength: 255
        name:
          type: string
          title: نام ویژگی
          maxLength: 100
        data_type:
          allOf:
          - $ref: '#/components/schemas/DataTypeEnum'
          title: نوع داده‌ای
      required:
      - data_type
      - id
      - name
      - slug
    DataTypeEnum:
      enum:
      - TEXT
      - INTEGER
      - BOOLEAN
      type: string
      description: |-
        * `TEXT` - متنی
        * `INTEGER` - عددی
        * `BOOLEAN` - بولین (بله/خیر)
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organizer:
          type: integer
          readOnly: true
          title: برگزارکننده
        title:
          type: string
          title: عنوان رویداد
          maxLength: 255
        description:
          type: string
          nullable: true
          title: توضیحات رویداد
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          title: وضعیت
        capacity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: ظرفیت
        start_date:
          type: string
          format: date-time
          title: تاریخ شروع
        end_date:
          type: string
          format: date-time
          title: تاریخ پایان
        attribute_values:
          type: array
          items:
            $ref: '#/components/schemas/EventAttributeValue'
          readOnly: true
      required:
      - attribute_values
      - capacity
      - end_date
      - id
      - organizer
      - start_date
      - title
    EventAttributeValue:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
          title: رویداد
        attribute:
          type: integer
          title: ویژگی
        value_text:
          type: string
          nullable: true
          title: مقدار متنی
        value_int:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
          title: مقدار عددی
        value_bool:
          type: boolean
          nullable: true
          title: مقدار بولین
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: تاریخ ایجاد
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: تاریخ به‌روزرسانی
      required:
      - attribute
      - created_at
      - event
      - id
      - updated_at
    EventStage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          allOf:
          - $ref: '#/components/schemas/Event'
          readOnly: true
        event_id:
          type: integer
          writeOnly: true
        title:
          type: string
          title: عنوان مرحله
          maxLength: 255
        description:
          type: string
          nullable: true
          title: توضیحات مرحله
        start_time:
          type: string
          format: date-time
          title: زمان شروع مرحله
        end_time:
          type: string
          format: date-time
          title: زمان پایان مرحله
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: ترتیب
      required:
      - end_time
      - event
      - id
      - order
      - start_time
      - title
    Feedback:
      type: object
      properties:
        participant:
          type: integer
          readOnly: true
          title: نویسنده نظر
        event:
          allOf:
          - $ref: '#/components/schemas/Event'
          readOnly: true
        event_id:
          type: integer
          writeOnly: true
        rating:
          type: integer
          maximum: 5
          minimum: 1
          title: امتیاز (از ۱ تا ۵)
        comment:
          type: string
          nullable: true
          title: متن نظر
      required:
      - event
      - event_id
      - participant
      - rating
    LogoutErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    LogoutSuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    MyTokenObtainPair:
      type: object
      properties:
        phone:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - phone
    PatchedAttribute:
