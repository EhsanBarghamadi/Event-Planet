          maxLength: 20
        first_name:
          type: string
          title: نام
          maxLength: 30
        last_name:
          type: string
          title: نام خانوادگی
          maxLength: 30
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          title: ' نقش'
        password:
          type: string
          writeOnly: true
      required:
      - first_name
      - last_name
      - password
      - phone
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
